name: Python CI

on:
 push:
    branches: [ "main" ]
 pull_request:
    branches: [ "main" ]

jobs:
 test:
    runs-on: ubuntu-latest

    steps:
        - name: Pobranie kodu
          uses: actions/checkout@v4

        - name: Ustawienia Pythona
          uses: actions/setup-python@v5
          with:
            python-version: '3.12'

        - name: 1. Instalacja zaleznosci
          run: |
           python -m pip install --upgrade pip
           pip install -r requirements.txt
        
        - name: 2. Linting (flake8)
          run: |
            flake8 src/ tests/ --count --max-line-length=132 --statistics

        - name: 3. Testy jednostkowe (pytest)
          run: |
           export PYTHONPATH=$PYTHONPATH:$(pwd)
           pytest

        - name: 4. Logowanie do Docker Hub
          uses: docker/login-action@v3
          with:
            username: ${{ secrets.DOCKER_USERNAME }}
            password: ${{ secrets.DOCKER_PASSWORD }}

        - name: 5. Budowanie i wysylka obrazu
          uses: docker/build-push-action@v5
          with:
            context: .
            push: true
            tags: kvbikk/password-generator:latest
            
        - name: 6. Uruchomienie generatora (generator.py)
          run: |
           export PYTHONPATH=$PYTHONPATH:$(pwd)
           python src/generator.py